<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password – ResuMatch Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dark-mode.css">
<style>.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#EEF2FF 0%,#F0FDF4 100%)}body.dark-mode .auth-page{background:linear-gradient(135deg,#0F172A 0%,#1E1B4B 50%,#022C22 100%)}.auth-card{width:100%;max-width:420px;padding:2.5rem;border-radius:16px;background:var(--card-bg);box-shadow:0 4px 24px rgba(0,0,0,0.08)}</style></head><body>
<div class="auth-page"><div class="auth-card">
<div class="text-center mb-4"><i class="fa-solid fa-lock fa-2x text-primary mb-2"></i><h4 class="fw-bold">Reset Password</h4><p class="text-muted">Enter your new password</p></div>
<form id="resetForm">
<div class="mb-3"><label class="form-label">New Password</label><input type="password" class="form-control" id="password" placeholder="Min 8 characters" required minlength="8"></div>
<div class="mb-3"><label class="form-label">Confirm Password</label><input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter password" required></div>
<div class="text-danger small mb-2" id="errorMsg"></div>
<div class="text-success small mb-2 d-none" id="successMsg">Password reset successfully! <a href="login.html">Login here</a></div>
<button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="resetBtn">Reset Password</button>
<p class="text-center small"><a href="login.html">← Back to Login</a></p></form></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/dark-mode.js"></script><script src="js/api.js"></script><script src="js/toast.js"></script><script src="js/auth.js"></script>
<script>
var token = new URLSearchParams(window.location.search).get('token');
document.getElementById('resetForm').addEventListener('submit',async function(e){
e.preventDefault();var pw=document.getElementById('password').value;var cp=document.getElementById('confirmPassword').value;
var er=document.getElementById('errorMsg');if(pw!==cp){er.textContent='Passwords do not match';return}
if(pw.length<8){er.textContent='Password must be 8+ characters';return}
er.textContent='';var btn=document.getElementById('resetBtn');btn.disabled=true;btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Resetting...';
var res=await Auth.resetPassword(token,pw);
if(res.success){document.getElementById('successMsg').classList.remove('d-none');Toast.show('Password reset!','success')
}else{er.textContent=res.message||'Reset failed. Link may be expired.';btn.disabled=false;btn.innerHTML='Reset Password'}
});
</script></body></html>
