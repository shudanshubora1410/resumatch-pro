<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – ResuMatch Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #EEF2FF 0%, #F0FDF4 100%); }
        body.dark-mode .auth-container { background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #022C22 100%); }
        .auth-card { width: 100%; max-width: 440px; padding: 2.5rem; border-radius: 16px; background: var(--card-bg); box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="fa-solid fa-key fa-2x text-primary mb-2"></i>
                <h4 class="fw-bold">Forgot Password?</h4>
                <p class="text-muted">Enter your email to receive a reset link</p>
            </div>
            <form id="forgotForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required placeholder="you@example.com">
                </div>
                <div class="mb-2 text-success small d-none" id="successMsg">If the email exists, a reset link has been sent!</div>
                <div class="mb-2 text-danger small" id="errorMsg"></div>
                <button type="submit" class="btn btn-primary w-100 mb-3" id="submitBtn">Send Reset Link</button>
                <p class="text-center small"><a href="login.html">← Back to Login</a></p>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dark-mode.js"></script>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('successMsg').classList.add('d-none');
            try {
                const res = await Api.post('/auth/forgot-password', { email });
                document.getElementById('successMsg').classList.remove('d-none');
                Toast.show('Reset link sent if email exists', 'info');
            } catch {
                document.getElementById('errorMsg').textContent = 'Something went wrong. Try again.';
            }
        });
    </script>
</body>
</html>
