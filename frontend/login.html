<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login – ResuMatch Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dark-mode.css">
<style>.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#EEF2FF 0%,#F0FDF4 100%)}body.dark-mode .auth-page{background:linear-gradient(135deg,#0F172A 0%,#1E1B4B 50%,#022C22 100%)}.auth-card{width:100%;max-width:420px;padding:2.5rem;border-radius:16px;background:var(--card-bg);box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid var(--border)}</style></head><body>
<div class="auth-page"><div class="auth-card">
<div class="text-center mb-4"><i class="fa-solid fa-file-lines fa-2x text-primary mb-2"></i><h4 class="fw-bold">Welcome Back</h4><p class="text-muted">Sign in to ResuMatch Pro</p></div>
<form id="loginForm" novalidate>
<div class="mb-3"><label class="form-label">Email</label><div class="input-group"><span class="input-group-text"><i class="fa-solid fa-envelope"></i></span><input type="email" class="form-control" id="email" placeholder="you@example.com" required></div></div>
<div class="mb-3"><label class="form-label">Password</label><div class="input-group"><span class="input-group-text"><i class="fa-solid fa-lock"></i></span><input type="password" class="form-control" id="password" placeholder="••••••••" required><button class="btn btn-outline-secondary" type="button" id="togglePw"><i class="fa-solid fa-eye"></i></button></div></div>
<div class="d-flex justify-content-between mb-3"><div class="form-check"><input class="form-check-input" type="checkbox" id="remember"><label class="form-check-label small" for="remember">Remember me</label></div><a href="forgot-password.html" class="small">Forgot Password?</a></div>
<div class="text-danger small mb-2" id="errorMsg"></div>
<button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="loginBtn"><i class="fa-solid fa-right-to-bracket me-2"></i>Sign In</button>
<p class="text-center text-muted small mb-0">No account? <a href="register.html" class="fw-semibold">Register</a></p></form></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/dark-mode.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/toast.js"></script><script src="js/auth.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit',async function(e){e.preventDefault();var em=document.getElementById('email').value.trim();var pw=document.getElementById('password').value;var er=document.getElementById('errorMsg');var bt=document.getElementById('loginBtn');if(!em||!pw){er.textContent='Fill all fields';return}er.textContent='';bt.disabled=true;bt.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';var r=await Auth.login(em,pw);if(r.success){Toast.show('Login successful!','success');setTimeout(function(){Auth.redirectToDashboard(r.data.role)},600)}else{er.textContent=r.message||'Invalid credentials';bt.disabled=false;bt.innerHTML='<i class="fa-solid fa-right-to-bracket me-2"></i>Sign In'}});
document.getElementById('togglePw').addEventListener('click',function(){var i=document.getElementById('password');var ic=this.querySelector('i');if(i.type==='password'){i.type='text';ic.className='fa-solid fa-eye-slash'}else{i.type='password';ic.className='fa-solid fa-eye'}});
</script></body></html>
