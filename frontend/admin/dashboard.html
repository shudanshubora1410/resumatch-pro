<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – ResuMatch Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/dark-mode.css">
</head>
<body>
    <nav class="navbar navbar-light bg-white border-bottom shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fa-solid fa-shield-halved text-danger"></i> ResuMatch Pro Admin
            </a>
            <div class="d-flex align-items-center gap-3">
                <button id="darkModeToggle" class="btn btn-outline-secondary btn-sm rounded-circle" aria-label="Toggle dark mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <span class="badge bg-danger">ADMIN</span>
            </div>
        </div>
    </nav>
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <nav>
                <a href="dashboard.html" class="sidebar-link active"><i class="fa-solid fa-gauge"></i> Dashboard</a>
                <a href="users.html" class="sidebar-link"><i class="fa-solid fa-users"></i> Users</a>
                <a href="jobs.html" class="sidebar-link"><i class="fa-solid fa-briefcase"></i> Jobs</a>
                <a href="audit-logs.html" class="sidebar-link"><i class="fa-solid fa-list-check"></i> Audit Logs</a>
                <a href="../index.html" class="sidebar-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </nav>
        </aside>
        <main class="dashboard-main">
            <h4 class="fw-bold mb-4">Admin Dashboard</h4>
            <p class="text-muted">Platform overview, user management, and audit logs are available through the sidebar.</p>
            <div class="row g-3">
                <div class="col-md-3"><div class="card p-3 text-center"><h2 class="fw-bold text-primary">0</h2><small>Total Users</small></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><h2 class="fw-bold text-success">0</h2><small>Active Jobs</small></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><h2 class="fw-bold text-warning">0</h2><small>Applications</small></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><h2 class="fw-bold text-info">0</h2><small>Avg Platform Score</small></div></div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/dark-mode.js"></script>
</body>
</html>
