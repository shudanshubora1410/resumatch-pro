<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Edit Job – ResuMatch Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/dark-mode.css"></head><body>
<nav class="navbar navbar-light bg-white border-bottom shadow-sm"><div class="container-fluid px-4">
<a class="navbar-brand fw-bold" href="dashboard.html"><i class="fa-solid fa-file-lines text-primary"></i> ResuMatch Pro</a>
<div class="d-flex align-items-center gap-3">
<button id="darkModeToggle" class="btn btn-outline-secondary btn-sm rounded-circle"><i class="fa-solid fa-moon"></i></button>
<a href="manage-jobs.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-arrow-left me-1"></i> Back</a></div></div></nav>
<div class="dashboard-layout">
<aside class="dashboard-sidebar"><nav>
<a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
<a href="manage-jobs.html" class="sidebar-link active"><i class="fa-solid fa-briefcase"></i> Manage Jobs</a></nav></aside>
<main class="dashboard-main">
<h4 class="fw-bold mb-1">Edit Job Listing</h4><p class="text-muted mb-4">Java Backend Developer at TCS</p>
<div class="alert alert-warning"><i class="fa-solid fa-triangle-exclamation me-1"></i><b>Warning:</b> Updating requirements (skills, keywords, experience) will automatically rescore all existing applicants.</div>
<div class="card"><div class="card-body">
<div class="mb-3"><label class="form-label">Job Title</label><input type="text" class="form-control" value="Java Backend Developer"></div>
<div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" rows="4">We are looking for a skilled Java Backend Developer...</textarea></div>
<div class="row"><div class="col-md-6 mb-3"><label class="form-label">Required Skills</label><input type="text" class="form-control" value="Java,Spring Boot,MySQL,Docker"></div>
<div class="col-md-6 mb-3"><label class="form-label">Preferred Skills</label><input type="text" class="form-control" value="Kubernetes,AWS,CI/CD"></div></div>
<div class="mb-3"><label class="form-label">ATS Keywords</label><input type="text" class="form-control" value="Java,Spring Boot,Microservices,JPA,Docker,Kubernetes,AWS,CI/CD"></div>
<div class="row"><div class="col-md-4 mb-3"><label class="form-label">Min Experience</label><input type="number" class="form-control" value="2"></div>
<div class="col-md-4 mb-3"><label class="form-label">Education</label><input type="text" class="form-control" value="B.Tech Computer Science"></div>
<div class="col-md-4 mb-3"><label class="form-label">Deadline</label><input type="date" class="form-control" value="2026-06-15"></div></div>
<div class="d-flex gap-2"><button class="btn btn-primary" onclick="alert('Job updated! All applicants will be rescored.')">Update Job</button><button class="btn btn-outline-secondary">Cancel</button></div></div></div>
</main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/dark-mode.js"></script><script src="../js/utils.js"></script><script src="../js/auth.js"></script><script>Utils.requireAuth();</script></body></html>
