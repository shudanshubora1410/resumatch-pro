<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Applicants – ResuMatch Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/dark-mode.css">
<style>
.filter-bar{border:1px solid var(--border);border-radius:12px;padding:16px;background:var(--card-bg);margin-bottom:16px}
.score-cell{font-weight:700;font-size:0.95rem}.rank-badge{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.85rem;background:var(--gray-200)}
.rank-badge.gold{background:#FEF3C7;color:#92400E}.rank-badge.silver{background:#F1F5F9;color:#475569}.rank-badge.bronze{background:#FEF3C7;color:#B45309}
.mini-bar{width:80px;height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:8px}
.mini-bar-fill{height:100%;border-radius:3px}
.bulk-bar{padding:10px 16px;background:#EEF2FF;border-radius:8px;display:none;margin-bottom:12px}.bulk-bar.show{display:flex;align-items:center;gap:10px}
</style></head><body>
<nav class="navbar navbar-light bg-white border-bottom shadow-sm"><div class="container-fluid px-4">
<a class="navbar-brand fw-bold" href="dashboard.html"><i class="fa-solid fa-file-lines text-primary"></i> ResuMatch Pro</a>
<div class="d-flex align-items-center gap-3">
<button id="darkModeToggle" class="btn btn-outline-secondary btn-sm rounded-circle"><i class="fa-solid fa-moon"></i></button>
<a href="manage-jobs.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-arrow-left me-1"></i> My Jobs</a></div></div></nav>

<div class="dashboard-layout">
<aside class="dashboard-sidebar"><nav>
<a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
<a href="post-job.html" class="sidebar-link"><i class="fa-solid fa-plus-circle"></i> Post Job</a>
<a href="manage-jobs.html" class="sidebar-link active"><i class="fa-solid fa-briefcase"></i> Manage Jobs</a>
<a href="bulk-screen.html" class="sidebar-link"><i class="fa-solid fa-upload"></i> Bulk Screen</a></nav></aside>

<main class="dashboard-main">
<div class="d-flex justify-content-between align-items-center mb-3">
<div><h4 class="fw-bold mb-1" id="jobTitleHdr">Java Backend Developer</h4><p class="text-muted mb-0" id="jobMetaHdr">TCS · 42 applicants · Avg Score: 67</p></div>
<a href="#" class="btn btn-sm btn-outline-secondary" title="Export CSV"><i class="fa-solid fa-download me-1"></i> Export CSV</a></div>

<!-- Filter Bar -->
<div class="filter-bar"><div class="row g-2 align-items-end">
<div class="col-md-3"><label class="form-label small">Score Range</label><div class="d-flex gap-2"><input type="number" class="form-control form-control-sm" id="minScore" placeholder="0" min="0" max="100"><span class="pt-1">–</span><input type="number" class="form-control form-control-sm" id="maxScore" placeholder="100" min="0" max="100"></div></div>
<div class="col-md-2"><label class="form-label small">Status</label><select class="form-select form-select-sm" id="statusFilter"><option value="">All</option><option>APPLIED</option><option>UNDER_REVIEW</option><option>SHORTLISTED</option><option>REJECTED</option><option>INTERVIEW_SCHEDULED</option></select></div>
<div class="col-md-2"><label class="form-label small">Sort By</label><select class="form-select form-select-sm" id="sortFilter"><option value="score,desc">Score ↓</option><option value="score,asc">Score ↑</option><option value="date,desc">Date ↓</option><option value="name,asc">Name A–Z</option></select></div>
<div class="col-md-3"><label class="form-label small">Search</label><input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Name or email..."></div>
<div class="col-md-2"><button class="btn btn-primary btn-sm w-100" onclick="applyFilters()">Apply Filters</button></div></div></div>

<!-- Bulk Actions Bar -->
<div class="bulk-bar" id="bulkBar">
<span class="fw-medium small" id="bulkCount">0 selected</span>
<button class="btn btn-success btn-sm" onclick="bulkAction('SHORTLISTED')"><i class="fa-solid fa-star me-1"></i> Shortlist</button>
<button class="btn btn-danger btn-sm" onclick="bulkAction('REJECTED')"><i class="fa-solid fa-ban me-1"></i> Reject</button>
<button class="btn btn-outline-secondary btn-sm" onclick="deselectAll()">Clear</button>
</div>

<div id="applicantsContent">
<div class="text-center py-5"><div class="spinner-border text-primary mb-2"></div><p class="text-muted">Loading applicants...</p></div></div>
<div id="applicantsPagination"></div>
</main></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/dark-mode.js"></script><script src="../js/utils.js"></script><script src="../js/api.js"></script><script src="../js/toast.js"></script><script src="../js/auth.js"></script><script src="../js/pagination.js"></script>
<script src="../js/recruiter/applicants.js"></script>
<script>
Utils.requireAuth();
var selectedIds = new Set();

var applicants = [];

setTimeout(function() { renderApplicants(applicants); }, 400);

function applyFilters() { renderApplicants(applicants); }

function renderApplicants(data) {
    var minS = parseInt(document.getElementById('minScore').value) || 0;
    var maxS = parseInt(document.getElementById('maxScore').value) || 100;
    var stFilter = document.getElementById('statusFilter').value;
    var search = document.getElementById('searchInput').value.toLowerCase();
    var filtered = data.filter(function(a) {
        if (a.score < minS || a.score > maxS) return false;
        if (stFilter && a.status !== stFilter) return false;
        if (search && !a.name.toLowerCase().includes(search) && !a.email.toLowerCase().includes(search)) return false;
        return true;
    });
    filtered.sort(function(a,b) { return b.score - a.score; });

    var html = '<div class="table-responsive"><table class="table table-hover"><thead class="table-light"><tr><th style="width:40px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th><th>#</th><th>Candidate</th><th>Score</th><th>Match</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
    if (filtered.length === 0) {
        html += '<tr><td colspan="8" class="text-center text-muted py-4">No applicants match your filters</td></tr>';
    }
    filtered.forEach(function(a, idx) {
        var rank = idx + 1;
        var rankCls = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
        var scColor = a.score >= 70 ? '#10B981' : a.score >= 50 ? '#F59E0B' : '#EF4444';
        var statusCls = Utils.getStatusClass(a.status);
        html += '<tr><td><input type="checkbox" class="app-check" value="' + a.id + '" onchange="updateSelection()" ' + (selectedIds.has(a.id) ? 'checked' : '') + '></td>';
        html += '<td><span class="rank-badge ' + rankCls + '">' + rank + '</span></td>';
        html += '<td><div class="fw-medium">' + a.name + '</div><small class="text-muted">' + a.email + ' · ' + a.location + '</small></td>';
        html += '<td><span class="score-cell" style="color:' + scColor + '">' + a.score + '</span><span class="mini-bar ms-2"><span class="mini-bar-fill" style="width:' + a.score + '%;background:' + scColor + '"></span></span></td>';
        html += '<td><span class="badge ' + (a.skillMatch >= 70 ? 'bg-success' : a.skillMatch >= 50 ? 'bg-warning text-dark' : 'bg-danger') + '">' + a.skillMatch + '%</span></td>';
        html += '<td><span class="status-badge ' + statusCls + '">' + Utils.getStatusLabel(a.status) + '</span></td>';
        html += '<td><small>' + Utils.formatDate(a.appliedAt) + '</small></td>';
        html += '<td><div class="dropdown"><button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">Actions</button><ul class="dropdown-menu"><li><a class="dropdown-item" href="#">View Report</a></li><li><a class="dropdown-item" href="#" onclick="quickStatus(' + a.id + ',\'SHORTLISTED\')">✅ Shortlist</a></li><li><a class="dropdown-item" href="#" onclick="quickStatus(' + a.id + ',\'REJECTED\')">❌ Reject</a></li><li><hr class="dropdown-divider"></li><li><a class="dropdown-item" href="#">📅 Schedule Interview</a></li><li><a class="dropdown-item" href="#">📥 Download Resume</a></li><li><a class="dropdown-item" href="#">📝 Add Notes</a></li></ul></div></td></tr>';
    });
    html += '</tbody></table></div>';
    document.getElementById('applicantsContent').innerHTML = html;
    Pagination.render('applicantsPagination', 0, Math.ceil(filtered.length / 20), function(p) {});
}

function toggleSelectAll(cb) {
    document.querySelectorAll('.app-check').forEach(function(c) {
        c.checked = cb.checked;
        if (cb.checked) selectedIds.add(parseInt(c.value));
        else selectedIds.delete(parseInt(c.value));
    });
    updateBulkBar();
}

function updateSelection() {
    selectedIds.clear();
    document.querySelectorAll('.app-check:checked').forEach(function(c) { selectedIds.add(parseInt(c.value)); });
    updateBulkBar();
}

function deselectAll() {
    selectedIds.clear();
    document.querySelectorAll('.app-check').forEach(function(c) { c.checked = false; });
    document.getElementById('selectAll').checked = false;
    updateBulkBar();
}

function updateBulkBar() {
    var bar = document.getElementById('bulkBar');
    document.getElementById('bulkCount').textContent = selectedIds.size + ' selected';
    bar.classList.toggle('show', selectedIds.size > 0);
}

function quickStatus(id, status) {
    Toast.show('Applicant ' + (status === 'SHORTLISTED' ? 'shortlisted' : 'rejected') + '!', status === 'SHORTLISTED' ? 'success' : 'warning');
}

function bulkAction(status) {
    Toast.show(selectedIds.size + ' applicants ' + (status === 'SHORTLISTED' ? 'shortlisted!' : 'rejected!'), status === 'SHORTLISTED' ? 'success' : 'warning');
    deselectAll();
}
</script></body></html>
