<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Manage Jobs – ResuMatch Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/dark-mode.css">
<style>.job-row{border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;background:var(--card-bg);transition:all 0.2s}.job-row:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}</style></head><body>
<nav class="navbar navbar-light bg-white border-bottom shadow-sm"><div class="container-fluid px-4">
<a class="navbar-brand fw-bold" href="dashboard.html"><i class="fa-solid fa-file-lines text-primary"></i> ResuMatch Pro</a>
<div class="d-flex align-items-center gap-3">
<button id="darkModeToggle" class="btn btn-outline-secondary btn-sm rounded-circle"><i class="fa-solid fa-moon"></i></button>
<a href="post-job.html" class="btn btn-primary btn-sm"><i class="fa-solid fa-plus me-1"></i> Post New Job</a></div></div></nav>

<div class="dashboard-layout">
<aside class="dashboard-sidebar"><nav>
<a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
<a href="post-job.html" class="sidebar-link"><i class="fa-solid fa-plus-circle"></i> Post Job</a>
<a href="manage-jobs.html" class="sidebar-link active"><i class="fa-solid fa-briefcase"></i> Manage Jobs</a>
<a href="bulk-screen.html" class="sidebar-link"><i class="fa-solid fa-upload"></i> Bulk Screen</a>
<a href="job-analytics.html" class="sidebar-link"><i class="fa-solid fa-chart-bar"></i> Analytics</a></nav></aside>

<main class="dashboard-main">
<div class="d-flex justify-content-between align-items-center mb-4"><h4 class="fw-bold mb-0">My Job Listings</h4><a href="post-job.html" class="btn btn-primary"><i class="fa-solid fa-plus me-1"></i> Post New Job</a></div>
<div class="d-flex gap-2 mb-3" id="statusTabs">
<button class="btn btn-sm btn-outline-secondary active" onclick="filterJobs('ALL')">All</button>
<button class="btn btn-sm btn-outline-success" onclick="filterJobs('ACTIVE')">Active</button>
<button class="btn btn-sm btn-outline-warning" onclick="filterJobs('DRAFT')">Drafts</button>
<button class="btn btn-sm btn-outline-danger" onclick="filterJobs('CLOSED')">Closed</button>
</div>
<div id="jobsContent"><div class="text-center py-5"><div class="spinner-border text-primary mb-2"></div></div></div>
</main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/dark-mode.js"></script><script src="../js/utils.js"></script><script src="../js/api.js"></script><script src="../js/toast.js"></script>
<script src="../js/recruiter/manage-jobs.js"></script><script src="../js/auth.js"></script>
<script>
Utils.requireAuth();
var currentFilter = 'ALL';
var jobs = [];

setTimeout(function() { renderJobs(jobs); }, 400);

function filterJobs(status) {
    currentFilter = status;
    document.querySelectorAll('#statusTabs button').forEach(function(b) { b.classList.remove('active'); });
    event.target.classList.add('active');
    renderJobs(jobs);
}

function renderJobs(data) {
    var filtered = currentFilter === 'ALL' ? data : data.filter(function(j) { return j.status === currentFilter; });
    var html = '';
    if (filtered.length === 0) {
        html = '<div class="text-center py-5"><p class="text-muted">No jobs found</p><a href="post-job.html" class="btn btn-primary btn-sm">Post a Job</a></div>';
    }
    filtered.forEach(function(j) {
        var statusCls = j.status === 'ACTIVE' ? 'status-shortlisted' : j.status === 'DRAFT' ? 'status-applied' : 'status-rejected';
        html += '<div class="job-row"><div class="row align-items-center"><div class="col-md-3"><h6 class="fw-bold mb-1">' + j.jobTitle + '</h6><span class="status-badge ' + statusCls + '">' + j.status + '</span></div><div class="col-md-2 text-center"><div class="fw-bold">' + j.applicants + '</div><small class="text-muted">Applicants</small></div><div class="col-md-2 text-center"><div class="fw-bold">' + j.avgScore + '</div><small class="text-muted">Avg Score</small></div><div class="col-md-2 text-center"><div class="fw-bold">' + j.shortlisted + '</div><small class="text-muted">Shortlisted</small></div><div class="col-md-3 text-end"><div class="d-flex gap-1 justify-content-end"><a href="applicants.html?jobId=' + j.id + '" class="btn btn-sm btn-outline-primary">View</a><a href="edit-job.html?id=' + j.id + '" class="btn btn-sm btn-outline-secondary">Edit</a><button class="btn btn-sm btn-outline-danger" onclick="closeJob(' + j.id + ')">Close</button></div></div></div></div>';
    });
    document.getElementById('jobsContent').innerHTML = html;
}

function closeJob(id) { if (confirm('Close this job listing?')) { Toast.show('Job closed', 'warning'); } }
</script></body></html>
