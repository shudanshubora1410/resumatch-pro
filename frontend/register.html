<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Register – ResuMatch Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dark-mode.css">
<style>.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#EEF2FF 0%,#F0FDF4 100%);padding:2rem 0}body.dark-mode .auth-page{background:linear-gradient(135deg,#0F172A 0%,#1E1B4B 50%,#022C22 100%)}.auth-card{width:100%;max-width:500px;padding:2.5rem;border-radius:16px;background:var(--card-bg);box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid var(--border)}.role-box{flex:1;padding:14px;border:2px solid var(--border);border-radius:12px;text-align:center;cursor:pointer;transition:all 0.2s}.role-box:hover{border-color:var(--primary-light)}.role-box.selected{border-color:var(--primary);background:rgba(79,70,229,0.05)}.recruiter-fields{display:none}.recruiter-fields.show{display:block}</style></head><body>
<div class="auth-page"><div class="auth-card">
<div class="text-center mb-4"><i class="fa-solid fa-user-plus fa-2x text-primary mb-2"></i><h4 class="fw-bold">Create Account</h4><p class="text-muted">Join ResuMatch Pro</p></div>
<form id="registerForm" novalidate>
<div class="mb-3"><label class="form-label fw-medium">I am a...</label><div class="d-flex gap-3"><div class="role-box selected" data-role="JOB_SEEKER"><i class="fa-solid fa-user-graduate fa-lg text-primary mb-1 d-block"></i><span class="fw-semibold small">Job Seeker</span></div><div class="role-box" data-role="RECRUITER"><i class="fa-solid fa-building fa-lg text-success mb-1 d-block"></i><span class="fw-semibold small">Recruiter</span></div></div></div>
<div class="mb-3"><label class="form-label">Full Name</label><input type="text" class="form-control" id="fullName" placeholder="John Doe" required></div>
<div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" id="email" placeholder="you@example.com" required></div>
<div class="mb-3"><label class="form-label">Phone (optional)</label><input type="tel" class="form-control" id="phone" placeholder="+91 9876543210"></div>
<div class="mb-3"><label class="form-label">Location</label><input type="text" class="form-control" id="location" placeholder="City, State"></div>
<div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" id="password" placeholder="Min 8 characters" required minlength="8"></div>
<div class="recruiter-fields" id="recruiterFields"><div class="mb-3"><label class="form-label">Company Name</label><input type="text" class="form-control" id="companyName" placeholder="Your Company Ltd."></div>
<div class="mb-3"><label class="form-label">Industry</label><select class="form-select" id="industry"><option value="">Select</option><option>Information Technology</option><option>Finance</option><option>Healthcare</option><option>Education</option><option>Other</option></select></div>
<div class="mb-3"><label class="form-label">Company Size</label><select class="form-select" id="companySize"><option value="">Select</option><option>1-10</option><option>11-50</option><option>51-200</option><option>201-500</option><option>500+</option></select></div></div>
<div class="text-danger small mb-2" id="errorMsg"></div>
<button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="regBtn"><i class="fa-solid fa-user-plus me-2"></i>Create Account</button>
<p class="text-center text-muted small mb-0">Already have an account? <a href="login.html" class="fw-semibold">Sign in</a></p></form></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/dark-mode.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/toast.js"></script><script src="js/auth.js"></script>
<script>
var selRole='JOB_SEEKER';document.querySelectorAll('.role-box').forEach(function(c){c.addEventListener('click',function(){document.querySelectorAll('.role-box').forEach(function(x){x.classList.remove('selected')});this.classList.add('selected');selRole=this.dataset.role;var rf=document.getElementById('recruiterFields');if(selRole==='RECRUITER')rf.classList.add('show');else rf.classList.remove('show')})});
document.getElementById('registerForm').addEventListener('submit',async function(e){e.preventDefault();var er=document.getElementById('errorMsg');var bt=document.getElementById('regBtn');var nm=document.getElementById('fullName').value.trim();var em=document.getElementById('email').value.trim();var pw=document.getElementById('password').value;if(!nm||!em||!pw){er.textContent='Fill all required fields';return}if(pw.length<8){er.textContent='Password must be 8+ characters';return}var d={fullName:nm,email:em,password:pw,phone:document.getElementById('phone').value.trim(),location:document.getElementById('location').value.trim(),role:selRole};if(selRole==='RECRUITER'){d.companyName=document.getElementById('companyName').value.trim();d.industry=document.getElementById('industry').value;d.companySize=document.getElementById('companySize').value}er.textContent='';bt.disabled=true;bt.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Creating...';var r=await Auth.register(d);if(r.success){Toast.show('Account created!','success');setTimeout(function(){Auth.redirectToDashboard(r.data.role)},800)}else{er.textContent=r.message||'Registration failed';bt.disabled=false;bt.innerHTML='<i class="fa-solid fa-user-plus me-2"></i>Create Account'}});
</script></body></html>
