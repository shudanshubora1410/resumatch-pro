<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ATS Analysis Report – ResuMatch Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/dark-mode.css">
    <style>
        .score-circle{width:200px;height:200px;margin:0 auto;position:relative}
        .score-doughnut-caption{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
        .score-doughnut-caption .score-num{font-size:3rem;font-weight:800;line-height:1}
        .section-card{border-radius:12px;border:1px solid var(--border);padding:20px;background:var(--card-bg);height:100%}
        .improvement-card{border-left:4px solid var(--primary);border-radius:0 12px 12px 0;padding:16px;margin-bottom:12px;background:var(--card-bg);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
        .improvement-card.high{border-left-color:var(--danger)}.improvement-card.medium{border-left-color:var(--warning)}.improvement-card.low{border-left-color:var(--success)}
        .skill-chip{display:inline-block;padding:3px 10px;border-radius:15px;font-size:0.8rem;font-weight:500;margin:2px}
        .skill-chip.matched{background:#D1FAE5;color:#065F46}.skill-chip.missing{background:#FEE2E2;color:#991B1B}
        .keyword-confidence{font-size:0.7rem;color:var(--text-secondary)}
        .progress{height:10px;border-radius:5px}.progress-bar{border-radius:5px}
        @media print{.navbar,.dashboard-sidebar,#darkModeToggle,.no-print{display:none!important}.dashboard-main{padding:0!important}.card{box-shadow:none!important;border:1px solid #ddd!important}}
    </style>
</head>
<body>
<nav class="navbar navbar-light bg-white border-bottom shadow-sm no-print"><div class="container-fluid px-4">
<a class="navbar-brand fw-bold" href="dashboard.html"><i class="fa-solid fa-file-lines text-primary"></i> ResuMatch Pro</a>
<div class="d-flex align-items-center gap-3">
<button id="darkModeToggle" class="btn btn-outline-secondary btn-sm rounded-circle"><i class="fa-solid fa-moon"></i></button>
<a href="dashboard.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-arrow-left me-1"></i> Dashboard</a>
<button onclick="window.print()" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-print me-1"></i> Print</button>
</div></div></nav>

<div class="dashboard-layout">
<aside class="dashboard-sidebar no-print"><nav>
<a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
<a href="upload-resume.html" class="sidebar-link"><i class="fa-solid fa-upload"></i> Upload Resume</a>
<a href="browse-jobs.html" class="sidebar-link"><i class="fa-solid fa-search"></i> Browse Jobs</a>
<a href="my-applications.html" class="sidebar-link active"><i class="fa-solid fa-list-check"></i> Applications</a>
<a href="recommendations.html" class="sidebar-link"><i class="fa-solid fa-lightbulb"></i> Recommendations</a></nav></aside>

<main class="dashboard-main" id="analysisMain">
<!-- SKELETON LOADER -->
<div id="skeletonLoader">
<div class="text-center mb-4"><div class="skeleton" style="width:200px;height:200px;border-radius:50%;margin:0 auto;"></div></div>
<div class="row g-3"><div class="col-md-6"><div class="skeleton" style="height:80px;border-radius:12px;"></div></div><div class="col-md-6"><div class="skeleton" style="height:80px;border-radius:12px;"></div></div></div>
<div class="skeleton mt-3" style="height:250px;border-radius:12px;"></div>
</div>

<!-- ACTUAL CONTENT (hidden initially) -->
<div id="analysisContent" style="display:none;">
<!-- Header -->
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
<div>
<h4 class="fw-bold mb-1" id="aJobTitle">--</h4>
<p class="text-muted mb-0"><span id="aCompany">--</span> &middot; Applied <span id="aDate">--</span> &middot; <span class="badge bg-light text-dark" id="aVersion">v1</span></p>
</div>
<div class="no-print"><span class="badge bg-light text-dark p-2" id="aStatus">--</span></div>
</div>

<!-- Overall Score -->
<div class="text-center mb-4">
<div class="score-circle"><canvas id="scoreDoughnut"></canvas>
<div class="score-doughnut-caption"><div class="score-num" id="scoreNum">--</div><small class="text-muted">/100</small></div></div>
<div class="mt-2"><span class="badge fs-6 px-3 py-2" id="scoreGrade">--</span></div>
<div class="mt-1"><span class="badge px-3 py-1" id="atsStatus">--</span></div>
</div>

<!-- Score Breakdown -->
<div class="row g-3 mb-4" id="scoreBreakdown"></div>

<!-- Skills Analysis -->
<div class="row g-3 mb-4">
<div class="col-lg-6"><div class="section-card"><h6 class="fw-bold mb-3"><i class="fa-solid fa-check-circle text-success me-2"></i>Matched Skills</h6><div id="matchedSkills"></div></div></div>
<div class="col-lg-6"><div class="section-card"><h6 class="fw-bold mb-3"><i class="fa-solid fa-xmark-circle text-danger me-2"></i>Missing Skills</h6><div id="missingSkills"></div></div></div>
</div>

<!-- Keywords -->
<div class="row g-3 mb-4">
<div class="col-lg-6"><div class="section-card"><h6 class="fw-bold mb-3"><i class="fa-solid fa-check text-success me-2"></i>Matched Keywords</h6><div id="matchedKeywords"></div></div></div>
<div class="col-lg-6"><div class="section-card"><h6 class="fw-bold mb-3"><i class="fa-solid fa-xmark text-danger me-2"></i>Missing Keywords</h6><div id="missingKeywords"></div></div></div>
</div>

<!-- Experience & Achievements -->
<div class="row g-3 mb-4">
<div class="col-md-6"><div class="section-card"><h6 class="fw-bold mb-3"><i class="fa-solid fa-briefcase me-2"></i>Experience Analysis</h6><div id="experienceAnalysis"></div></div></div>
<div class="col-md-6"><div class="section-card"><h6 class="fw-bold mb-3"><i class="fa-solid fa-trophy me-2"></i>Achievements</h6><div id="achievementAnalysis"></div></div></div>
</div>

<!-- Resume Structure -->
<div class="section-card mb-4"><h6 class="fw-bold mb-3"><i class="fa-solid fa-file-lines me-2"></i>Resume Structure</h6><div class="row" id="structureAnalysis"></div></div>

<!-- Improvement Suggestions -->
<div class="mb-4"><h5 class="fw-bold mb-3"><i class="fa-solid fa-lightbulb text-warning me-2"></i>Improvement Suggestions</h5><div id="improvementSuggestions"></div></div>

<!-- What-If Simulator -->
<div class="mb-4" id="whatIfContainer"></div>

<!-- Overall Feedback -->
<div class="section-card mb-4"><h6 class="fw-bold mb-2"><i class="fa-solid fa-message me-2"></i>Overall Feedback</h6><p id="overallFeedback" class="mb-0"></p></div>
</div>
</main></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../js/dark-mode.js"></script><script src="../js/utils.js"></script><script src="../js/api.js"></script><script src="../js/toast.js"></script><script src="../js/auth.js"></script>
<script src="../js/seeker/what-if-simulator.js"></script>
<script>
(function(){
Utils.requireAuth();
var appId = new URLSearchParams(window.location.search).get('appId') || '1';
var analysis = null;

// Mock data for demo (replace with API call: Api.get('/seeker/analysis/' + appId))
setTimeout(function(){
analysis = {
    applicationId: 1001, analysisStatus: "COMPLETED", jobTitle: "Java Backend Developer",
    companyName: "TCS", analysisDate: "2026-05-20T14:30:00", scoreVersion: 3,
    finalScore: 78, grade: "B+", gradeLabel: "Good Match", atsStatus: "LIKELY TO PASS ATS",
    scoreBreakdown: {
        keywordMatch: {score:24, maxScore:30, label:"Keyword Match", status:"GOOD"},
        skillRelevance: {score:20, maxScore:25, label:"Skill Relevance", status:"GOOD"},
        experienceQuality: {score:14, maxScore:20, label:"Experience Quality", status:"AVERAGE"},
        achievementsImpact: {score:12, maxScore:15, label:"Achievements & Impact", status:"GOOD"},
        formattingStructure: {score:8, maxScore:10, label:"Formatting & Structure", status:"GOOD"},
        educationMatch: {score:4, maxScore:5, label:"Education Match", status:"GOOD"}
    },
    matchedSkills: ["Java","Spring Boot","MySQL","REST API","Git","Maven"],
    missingSkills: ["Docker","Kafka","Kubernetes","AWS"],
    matchedKeywords: ["Java","Spring Boot","Microservices","JPA"],
    missingKeywords: ["Docker","Kubernetes","AWS","CI/CD"],
    keywordConfidence: {Java:1.0,"Spring Boot":0.95,Microservices:0.75,JPA:0.85},
    detectedVerbs: ["developed","implemented","optimized","designed","deployed"],
    weakPhrases: ["worked on","involved in"],
    estimatedYears: 3, requiredYears: 3, gapYears: 0,
    achievements: ["improved performance by 40%","reduced load time by 30%","served 10,000+ users"],
    detectedSections: ["Skills","Experience","Education","Projects","Summary"],
    missingSections: ["Certifications"],
    contactInfo: {email:true,phone:true,linkedin:true,github:false},
    resumeWordCount: 642, atsFriendly: true,
    educationDetected: "B.Tech Information Technology",
    educationRequired: "B.Tech Computer Science",
    educationMatchType: "RELATED_MATCH",
    weakAreas: [
        "Missing Docker and cloud-related keywords",
        "Experience contains weak phrases like 'worked on'",
        "No Certifications section",
        "GitHub profile not present"
    ],
    suggestions: [
        {priority:1,area:"Missing Keywords",suggestion:"Add Docker, Kubernetes, AWS, and CI/CD experience. Even basic familiarity should be mentioned.",impact:"HIGH",estimatedScoreGain:6},
        {priority:2,area:"Experience Quality",suggestion:"Replace 'worked on backend systems' with specific, measurable accomplishments. Use strong action verbs.",impact:"HIGH",estimatedScoreGain:4},
        {priority:3,area:"Missing Skills",suggestion:"Add Docker and Kafka to skills section — even self-learned. Consider free certification.",impact:"HIGH",estimatedScoreGain:4},
        {priority:4,area:"Achievements",suggestion:"Quantify at least 2 more project outcomes with numbers and percentages.",impact:"MEDIUM",estimatedScoreGain:3},
        {priority:5,area:"Contact & Links",suggestion:"Add GitHub profile URL to improve recruiter trust.",impact:"LOW",estimatedScoreGain:1}
    ],
    overallFeedback: "Your resume demonstrates solid Java and Spring Boot fundamentals. Cloud and DevOps skills are explicitly required and missing. Adding these could push your score above 85. Focus on replacing vague language with specific accomplishments."
};
renderAnalysis(analysis);
}, 800);

function renderAnalysis(a) {
    document.getElementById('skeletonLoader').style.display = 'none';
    document.getElementById('analysisContent').style.display = 'block';
    if (!a) return;

    // Header
    document.getElementById('aJobTitle').textContent = a.jobTitle;
    document.getElementById('aCompany').textContent = a.companyName;
    document.getElementById('aDate').textContent = Utils.formatDate(a.analysisDate);
    document.getElementById('aVersion').textContent = 'v' + (a.scoreVersion || 1);
    document.getElementById('aStatus').innerHTML = '<i class="fa-solid fa-circle-check text-success me-1"></i>' + (a.analysisStatus || 'COMPLETED');

    // Doughnut chart
    var ctx = document.getElementById('scoreDoughnut').getContext('2d');
    var sc = a.finalScore;
    var color = sc >= 70 ? '#10B981' : sc >= 50 ? '#F59E0B' : '#EF4444';
    new Chart(ctx, {
        type: 'doughnut',
        data: { datasets: [{
            data: [sc, 100 - sc],
            backgroundColor: [color, '#E5E7EB'],
            borderWidth: 0,
            borderRadius: sc >= 100 ? 0 : 20
        }]},
        options: { cutout: '75%', responsive: true, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
    });
    document.getElementById('scoreNum').textContent = sc;
    document.getElementById('scoreNum').style.color = color;
    document.getElementById('scoreGrade').textContent = a.grade + ' - ' + a.gradeLabel;
    document.getElementById('scoreGrade').className = 'badge fs-6 px-3 py-2 bg-' + (sc >= 70 ? 'success' : sc >= 50 ? 'warning' : 'danger');
    var atsEl = document.getElementById('atsStatus');
    atsEl.textContent = a.atsStatus;
    atsEl.className = 'badge px-3 py-1 ' + (sc >= 70 ? 'score-badge green' : sc >= 50 ? 'score-badge orange' : 'score-badge red');

    // Score Breakdown
    var sbHtml = '';
    var categories = a.scoreBreakdown || {};
    Object.keys(categories).forEach(function(k) {
        var cat = categories[k];
        var pct = cat.score / cat.maxScore * 100;
        var barColor = pct >= 70 ? 'bg-success' : pct >= 40 ? 'bg-warning' : 'bg-danger';
        sbHtml += '<div class="col-md-6"><div class="d-flex justify-content-between mb-1"><span class="fw-medium small">' + cat.label + '</span><span class="small">' + cat.score + '/' + cat.maxScore + '</span></div><div class="progress"><div class="progress-bar ' + barColor + '" style="width:' + pct + '%"></div></div></div>';
    });
    document.getElementById('scoreBreakdown').innerHTML = sbHtml;

    // Skills
    var mSkills = (a.matchedSkills || []).map(function(s) { return '<span class="skill-chip matched">' + s + '</span>'; }).join(' ');
    document.getElementById('matchedSkills').innerHTML = mSkills || '<span class="text-muted small">None matched</span>';
    var msSkills = (a.missingSkills || []).map(function(s) { return '<span class="skill-chip missing">' + s + ' <i class="fa-solid fa-xmark"></i></span>'; }).join(' ');
    document.getElementById('missingSkills').innerHTML = msSkills || '<span class="text-success small">All matched!</span>';

    // Keywords
    var mKw = (a.matchedKeywords || []).map(function(k) {
        var conf = (a.keywordConfidence || {})[k];
        return '<span class="skill-chip matched">' + k + (conf ? ' <span class="keyword-confidence">(' + Math.round(conf * 100) + '%)</span>' : '') + '</span>';
    }).join(' ');
    document.getElementById('matchedKeywords').innerHTML = mKw || '<span class="text-muted small">None</span>';
    var msKw = (a.missingKeywords || []).map(function(k) { return '<span class="skill-chip missing">' + k + ' <i class="fa-solid fa-xmark"></i></span>'; }).join(' ');
    document.getElementById('missingKeywords').innerHTML = msKw || '<span class="text-success small">All matched!</span>';

    // Experience
    var expHtml = '<p class="small mb-1"><b>Action Verbs:</b> ' + (a.detectedVerbs || []).map(function(v) { return '<span class="badge bg-primary me-1">' + v + '</span>'; }).join(' ') + '</p>';
    if (a.weakPhrases && a.weakPhrases.length > 0) expHtml += '<p class="small mb-1"><b>Weak Phrases:</b> ' + (a.weakPhrases || []).map(function(w) { return '<span class="badge bg-warning text-dark me-1">' + w + '</span>'; }).join(' ') + '</p>';
    expHtml += '<p class="small mb-1"><b>Experience:</b> ' + (a.estimatedYears || 0) + ' years detected' + (a.requiredYears > 0 ? ' (Required: ' + a.requiredYears + ' years)' : '') + '</p>';
    if (a.gapYears > 0) expHtml += '<p class="small text-danger"><b>Gap:</b> ' + a.gapYears + ' years below requirement</p>';
    document.getElementById('experienceAnalysis').innerHTML = expHtml;

    // Achievements
    var achHtml = '<p class="small mb-1"><b>Measurable Achievements:</b> ' + (a.achievements || []).length + ' found</p>';
    (a.achievements || []).forEach(function(ach) { achHtml += '<p class="small mb-1"><i class="fa-solid fa-check-circle text-success me-1"></i>' + ach + '</p>'; });
    document.getElementById('achievementAnalysis').innerHTML = achHtml;

    // Structure
    var secs = a.detectedSections || [];
    var misSecs = a.missingSections || [];
    var structHtml = '<div class="col-md-6"><p class="small fw-bold mb-2">Detected Sections:</p>';
    secs.forEach(function(s) { structHtml += '<span class="badge bg-success me-1 mb-1">' + s + ' ✓</span> '; });
    structHtml += '</div><div class="col-md-6"><p class="small fw-bold mb-2">Missing Sections:</p>';
    if (misSecs.length === 0) structHtml += '<span class="text-success small">None missing</span>';
    else misSecs.forEach(function(s) { structHtml += '<span class="badge bg-danger me-1 mb-1">' + s + ' ✗</span> '; });
    structHtml += '</div><div class="col-12 mt-2"><p class="small mb-1"><b>Contact Info:</b> ';
    var ci = a.contactInfo || {};
    Object.keys(ci).forEach(function(k) { structHtml += '<span class="badge ' + (ci[k] ? 'bg-success' : 'bg-danger') + ' me-1">' + k + (ci[k] ? ' ✓' : ' ✗') + '</span> '; });
    structHtml += '</p><p class="small"><b>ATS Friendly:</b> <span class="badge ' + (a.atsFriendly ? 'bg-success' : 'bg-danger') + '">' + (a.atsFriendly ? 'Yes' : 'No') + '</span> &middot; <b>Words:</b> ' + (a.resumeWordCount || 0) + '</p></div>';
    document.getElementById('structureAnalysis').innerHTML = structHtml;

    // Improvement Suggestions
    var sugHtml = '';
    (a.suggestions || []).forEach(function(s) {
        var impactCls = s.impact === 'HIGH' ? 'high' : s.impact === 'MEDIUM' ? 'medium' : 'low';
        sugHtml += '<div class="improvement-card ' + impactCls + '"><div class="d-flex justify-content-between align-items-start"><div><span class="badge bg-dark me-2">#' + s.priority + '</span><span class="fw-medium">' + s.area + '</span></div><span class="badge ' + (s.impact === 'HIGH' ? 'bg-danger' : s.impact === 'MEDIUM' ? 'bg-warning text-dark' : 'bg-success') + '">' + s.impact + ' &middot; +' + s.estimatedScoreGain + ' pts</span></div><p class="small mt-2 mb-0">' + s.suggestion + '</p></div>';
    });
    document.getElementById('improvementSuggestions').innerHTML = sugHtml;

    // Overall Feedback
    document.getElementById('overallFeedback').textContent = a.overallFeedback || 'No feedback available.';

    // What-If Simulator
    if (a.missingKeywords || a.missingSkills) {
        WhatIfSimulator.init({
            originalScore: a.finalScore,
            missingKeywords: a.missingKeywords || [],
            missingSkills: a.missingSkills || [],
            scoreBreakdown: a.scoreBreakdown || {}
        });
    }
}
})();
</script>
</body>
</html>
