server.port=8080
server.servlet.context-path=/api
server.servlet.multipart.max-file-size=5MB
server.servlet.multipart.max-request-size=50MB

spring.datasource.url=jdbc:mysql://localhost:3306/resumatch_pro?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

app.storage.type=local
app.storage.local-path=./uploads/resumes/
app.storage.allowed-extensions=pdf,docx
app.storage.max-file-size-mb=5

app.minio.enabled=false
app.minio.endpoint=http://localhost:9000
app.minio.access-key=minioadmin
app.minio.secret-key=${MINIO_SECRET_KEY}
app.minio.bucket=resumatch-resumes

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.cache.type=simple

app.async.core-pool-size=4
app.async.max-pool-size=8
app.async.queue-capacity=100
app.async.thread-name-prefix=resumatch-async-

app.rate-limit.resume-upload-per-hour=10
app.rate-limit.api-requests-per-minute=200
app.rate-limit.login-max-attempts=5
app.rate-limit.login-lock-duration-minutes=15

logging.level.com.resumatchpro=DEBUG
logging.level.org.springframework.security=WARN
logging.file.path=./logs

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

app.scheduler.deadline-reminder-cron=0 0 9 * * *
app.recommendation.max-results=5
app.recommendation.min-match-percentage=30

# Application Base URL (change when deploying live)
app.base-url=http://localhost:8080
