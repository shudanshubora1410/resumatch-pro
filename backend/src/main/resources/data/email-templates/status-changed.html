<!DOCTYPE html><html><head><meta charset="UTF-8"></head>
<body style="font-family:Arial,sans-serif;margin:0;padding:0;background:#f4f4f8">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:20px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08)">
<tr><td style="background:#4F46E5;padding:30px 20px;text-align:center;color:#fff"><h1 style="margin:0;font-size:24px">📋 Application Update</h1></td></tr>
<tr><td style="padding:30px">
<h2 style="color:#111827">Hi {{name}},</h2>
<p style="color:#374151;line-height:1.6">Your application for <b>{{jobTitle}}</b> at <b>{{company}}</b> has been updated.</p>
<div style="background:#EEF2FF;border-left:4px solid #4F46E5;padding:16px;border-radius:8px;margin:20px 0"><p style="margin:0;font-size:18px;font-weight:700;color:#4338CA">Current Status: <span style="text-transform:capitalize">{{status}}</span></p></div>

<a href="http://localhost:8080/seeker/my-applications.html" style="display:inline-block;padding:14px 32px;background:#4F46E5;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;font-size:16px;margin:16px 0">View Details →</a></td></tr>
<tr><td style="background:#F9FAFB;padding:16px;text-align:center"><p style="color:#9CA3AF;font-size:12px;margin:0">© 2026 ResuMatch Pro</p></td></tr></table></body></html>
